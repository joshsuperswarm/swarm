databases:
  - name: swarm-database
    databaseName: swarm
    user: swarm_user
    plan: basic-1gb

services:
  - type: web
    name: swarm-backend
    runtime: rust            # prefer "runtime" over legacy "env"
    plan: starter
    # If your Cargo.toml lives in /backend, keep this. Otherwise remove it.
    rootDir: backend

    # Build the binary (skip dev/test deps) and ensure sqlx-cli is available.
    buildCommand: |
      set -euo pipefail
      export XDG_CACHE_HOME=/opt/render/.cache
      export CARGO_HOME="$XDG_CACHE_HOME/cargo"
      export CARGO_TARGET_DIR=target

      if ! command -v sqlx >/dev/null 2>&1; then
        cargo install sqlx-cli --locked --no-default-features --features rustls,postgres
      fi

      cargo build --release --no-dev-deps

    # Run DB migrations right before the new release goes live.
    preDeployCommand: |
      export XDG_CACHE_HOME=/opt/render/.cache
      export CARGO_HOME="$XDG_CACHE_HOME/cargo"
      sqlx migrate run

    startCommand: ./target/release/swarm-backend

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: swarm-database
          property: connectionString
      - key: CLERK_SECRET_KEY
        sync: false
      - key: RUST_LOG
        value: info
      - key: PORT
        value: 10000
      - key: MODAL_URL
        fromService:
          name: swarm-sandbox
          type: pserv
          property: hostport
    healthCheckPath: /health
    domains:
      - api.superswarm.dev

  # React Frontend
  - type: web
    name: swarm-frontend
    env: static
    rootDir: frontend
    buildCommand: bun install && bun run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: VITE_API_URL
        value: https://api.superswarm.dev
    domains:
      - app.superswarm.dev

  # Modal Python Shim Service (Internal only)
  - type: pserv
    name: swarm-sandbox
    env: python
    plan: starter
    rootDir: sandbox
    buildCommand: uv sync --frozen
    startCommand: uv run swarm-sandbox
    envVars:
      - key: PORT
        value: 8000
      - key: MODAL_TOKEN_ID
        sync: false
      - key: MODAL_TOKEN_SECRET
        sync: false
      - key: MODAL_ENVIRONMENT
        value: main
