services:
  # PostgreSQL Database
  - type: pserv
    name: swarm-database
    env: postgresql
    plan: starter
    databaseName: swarm
    databaseUser: swarm_user

  # Rust Backend API
  - type: web
    name: swarm-backend
    env: rust
    plan: starter
    rootDir: backend
    buildCommand: cargo install sqlx-cli --no-default-features --features rustls,postgres && sqlx migrate run && cargo build --release
    startCommand: ./target/release/swarm-backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: swarm-database
          property: connectionString
      - key: CLERK_SECRET_KEY
        sync: false
      - key: RUST_LOG
        value: info
      - key: PORT
        value: 10000
    healthCheckPath: /health
    domains:
      - api.superswarm.dev

  # React Frontend
  - type: web
    name: swarm-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: VITE_API_URL
        fromService:
          type: web
          name: swarm-backend
          envVarKey: RENDER_EXTERNAL_URL
    domains:
      - app.superswarm.dev
