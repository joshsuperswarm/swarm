databases:
  - name: swarm-database
    databaseName: swarm
    user: swarm_user
    plan: basic-1gb

services:
  # Rust Backend API
  - type: web
    name: swarm-backend
    env: rust
    plan: starter
    rootDir: backend
    buildCommand: cargo install sqlx-cli --no-default-features --features rustls,postgres && sqlx migrate run && cargo build --release
    startCommand: ./target/release/swarm-backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: swarm-database
          property: connectionString
      - key: CLERK_SECRET_KEY
        sync: false
      - key: RUST_LOG
        value: info
      - key: PORT
        value: 10000
      - key: MODAL_URL
        value: http://swarm-modal:8000
    healthCheckPath: /health
    domains:
      - api.superswarm.dev

  # React Frontend
  - type: web
    name: swarm-frontend
    env: static
    rootDir: frontend
    buildCommand: bun install && bun run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: VITE_API_URL
        value: https://api.superswarm.dev
    domains:
      - app.superswarm.dev

  # Modal Python Shim Service (Internal only)
  - type: pserv
    name: swarm-modal
    env: python
    plan: starter
    rootDir: modal
    buildCommand: pip install -r requirements.txt
    startCommand: python run_shim.py
    port: 8000
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8000
      - key: MODAL_TOKEN_ID
        sync: false
      - key: MODAL_TOKEN_SECRET
        sync: false
      - key: MODAL_ENVIRONMENT
        value: main
      - key: PYTHONPATH
        value: /opt/render/project/src
